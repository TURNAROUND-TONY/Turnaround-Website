<!DOCTYPE html>
<html lang="en" data-theme="navy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Testimonials — Turnaround</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;600&family=Fraunces:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="pages.css">
</head>
<body>
<div id="root"></div>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel">

const QUOTES = [
  { quote: "They didn't sell us a migration. They sold us certainty — and delivered it. Cutover happened on a Tuesday morning. We didn't lose a sale.", name: "Ops Director", role: "Mid-market apparel · Magento → Plus" },
  { quote: "The reconciliation work alone was worth the engagement. Every product, every variant, every price. To the row.", name: "Head of Ecommerce", role: "B2B distributor · BC → Plus" },
  { quote: "We'd been burnt by a previous agency. Turnaround did the unglamorous work — runbooks, mock cutovers, written sign-offs — and shipped without drama.", name: "Founder & CEO", role: "DTC home goods · Custom → Plus" },
  { quote: "Our deploy velocity multiplied roughly 4× in the first quarter post-launch. The platform stopped being a tax on the team.", name: "VP Engineering", role: "Lifestyle brand · Magento → Plus" },
  { quote: "They were honest about what we didn't need. That's the part you don't get from most agencies, and it saved us six figures of out-of-scope work.", name: "Head of Operations", role: "Skincare · Plus build" },
  { quote: "Ninety days post-launch, they were still on the weekly call. Stabilisation as promised — not a line item that quietly disappeared.", name: "CTO", role: "Watch parts · BC → Plus" },
];

const TestimonialsPage = () => (
  <>
    <NavBar active="work" />
    <main data-screen-label="Testimonials">
      <section className="page-hero">
        <div className="container">
          <div>
            <span className="pretitle">— In Their Words</span>
            <h1>Migration<br /><em>success stories.</em></h1>
          </div>
          <p className="lede">
            We don't run testimonial campaigns. These are quotes from operators we've shipped against — pulled from emails, retros, and the kinds of things you only say to an agency you'd hire again.
          </p>
        </div>
      </section>

      <section className="section">
        <div className="container">
          {QUOTES.map((q, i) => (
            <div className="testimonial-block" key={i}>
              <div className="meta">
                <span className="num">— {String(i + 1).padStart(2, "0")} / {String(QUOTES.length).padStart(2, "0")}</span>
                <span className="stars">★ ★ ★ ★ ★</span>
              </div>
              <blockquote>
                <p className="qt"><em>"{q.quote}"</em></p>
                <div className="att">
                  <span className="name">— {q.name}</span>
                  <span className="role">{q.role}</span>
                </div>
              </blockquote>
            </div>
          ))}
        </div>
      </section>

      <section className="section">
        <div className="container">
          <div className="cta-box" style={{ background: "var(--paper)", color: "var(--ink)", border: "1px solid var(--hairline)", borderRadius: 24, padding: "clamp(56px, 8vw, 120px)" }}>
            <span className="eyebrow" style={{ display: "block", marginBottom: 24 }}>— Add yours</span>
            <h2 className="display" style={{ fontSize: "clamp(48px, 6vw, 96px)" }}>Let's build<br /><em>the next one.</em></h2>
            <div className="hero-actions" style={{ marginTop: 36 }}>
              <a href="contact.html" className="btn btn-primary">Book a migration audit <span className="arrow">→</span></a>
            </div>
          </div>
        </div>
      </section>
    </main>
    <Footer />
  </>
);

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<TestimonialsPage />);
</script>
<script src="reveal.js" defer></script>
</body>
</html>
